name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Stage 1 — Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Stage 3–4 — Backend install, build, test
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Stage 3–4 — Frontend install, build, test
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Stage 5 — Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Stage 5 — Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: healthcare-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Stage 5 — Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: healthcare-frontend:latest
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Stage 6 — Compose validation (deploy readiness)
        run: docker compose config
